<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern QR Generator</title>
    <link rel="stylesheet" href="qrstyle.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="header">
            <h2>QR Tool</h2>
            <label class="theme-switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider round"></span>
            </label>
        </div>

        <div class="tabs">
            <button id="tab-generate" class="tab-btn active">Generate</button>
            <button id="tab-scan" class="tab-btn">Scan</button>
        </div>
        
        <div id="generate-section">
            <div class="template-selector">
                <label for="qr-type">QR အမျိုးအစား - </label>
                <select id="qr-type">
                    <option value="text">စာသား / လင့်ခ်</option>
                    <option value="vcard">လိပ်စာကတ် (vCard)</option>
                    <option value="wifi">WiFi ချိတ်ဆက်ရန်</option>
                </select>
            </div>

            <div id="input-text-group" class="input-wrapper">
                <input type="text" id="qr-input" placeholder="စာသား သို့မဟုတ် လင့်ခ်ထည့်ပါ">
                <span id="clear-btn" class="clear-icon" title="Clear">&times;</span>
            </div>

            <div id="input-vcard-group" style="display: none;">
                <input type="text" id="vcard-name" class="multi-input" placeholder="အမည် (Name)">
                <input type="text" id="vcard-phone" class="multi-input" placeholder="ဖုန်းနံပါတ် (Phone)">
                <input type="email" id="vcard-email" class="multi-input" placeholder="အီးမေးလ် (Email)">
                <input type="text" id="vcard-company" class="multi-input" placeholder="ကုမ္ပဏီ / ရာထူး (Company)">
            </div>

            <div id="input-wifi-group" style="display: none;">
                <input type="text" id="wifi-ssid" class="multi-input" placeholder="WiFi အမည် (SSID)">
                <input type="text" id="wifi-pass" class="multi-input" placeholder="Password">
                <select id="wifi-type" class="multi-input">
                    <option value="WPA">WPA/WPA2 (အများဆုံးသုံးသည်)</option>
                    <option value="WEP">WEP</option>
                    <option value="nopass">Password မလိုပါ</option>
                </select>
            </div>
            
            <div class="color-picker-group">
                <label for="qr-color">QR Code အရောင် - </label>
                <input type="color" id="qr-color" value="#000000">
            </div>

            <div class="template-selector">
                <label for="qr-frame-style">Frame ပုံစံ - </label>
                <select id="qr-frame-style">
                    <option value="none">မပါပါ</option>
                    <option value="scan-me">"Scan Me" ဘောင်</option>
                </select>
            </div>

            <button id="generate-btn">Generate</button>
            
            <div id="qr-outer-frame" class="frame-none">
                <div id="frame-text">SCAN ME</div>
                <div id="qr-wrapper">
                    <div id="qrcode"></div>
                    <img id="qr-logo" src="" alt="Logo">
                </div>
            </div>
            
            <button id="download-btn" style="display: none;">Download QR</button>
        </div>

        <div id="scan-section" style="display: none;">
            <button id="switch-camera-btn" class="secondary-btn" style="margin-bottom: 15px;">🔄 ကင်မရာ ပြောင်းရန်</button>
            <div id="reader"></div>
            <div id="scan-result-box" style="display: none;">
                <p><strong>Scanned Result:</strong></p>
                <a id="scan-result-link" href="#" target="_blank" style="word-break: break-all; display: block; margin-bottom: 15px;"></a>
                
                <!-- ခလုတ် ၂ ခုကို ဘေးတိုက်ထားရန် Flex သုံးထားပါသည် -->
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="copy-btn" class="secondary-btn">Copy</button>
                    <!-- လင့်ခ်ဖြစ်မှသာ ပေါ်လာမည့် Open Link ခလုတ် -->
                    <button id="open-link-btn" style="display: none; background-color: #28a745;">🌐 Open Link</button>
                </div>
            </div>
        </div>
    </div>

    <script src="qrapp.js"></script>
</body>
</html>
